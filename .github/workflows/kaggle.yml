name: 📊 دانلود از Kaggle

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: 'آدرس دیتاست Kaggle (مثال: salikhussaini49/Boxing-pose-dataset)'
        required: true
        default: 'salikhussaini49/Boxing-pose-dataset'
        type: string
      output_folder:
        description: 'نام پوشه خروجی در ریپازیتوری'
        required: true
        default: 'kaggle_downloads'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 بررسی کد (Checkout)
        uses: actions/checkout@v4

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 نصب kaggle (فقط)
        run: |
          pip install kaggle

      - name: 🔑 تنظیم Kaggle (روش قدیمی)
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "✅ تنظیمات Kaggle انجام شد."

      - name: 📥 دانلود دیتاست با kaggle CLI
        run: |
          DATASET="${{ github.event.inputs.dataset }}"
          OUTPUT_DIR="${{ github.event.inputs.output_folder }}"
          
          echo "⏳ شروع دانلود از $DATASET..."
          
          # دانلود با kaggle CLI
          kaggle datasets download "$DATASET" --unzip -p "./$OUTPUT_DIR"
          
          echo "✅ دانلود کامل شد."
          echo "📄 فایل‌های دانلود شده:"
          ls -la "./$OUTPUT_DIR"

      - name: 📤 کامیت فایل‌ها به ریپازیتوری
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ${{ github.event.inputs.output_folder }}
          git diff --quiet && git diff --staged --quiet || git commit -m "📦 اضافه شدن دیتاست از Kaggle: ${{ github.event.inputs.dataset }}"
          git push
