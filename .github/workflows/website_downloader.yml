name: Download Full Website

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'آدرس کامل سایت (مثلا https://example.com)'
        required: true
        type: string

jobs:
  download_website:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install wget
      run: sudo apt-get update && sudo apt-get install -y wget

    - name: Create output directory
      run: mkdir -p downloaded_site

    - name: Download entire site with wget
      run: |
        wget \
          --mirror \
          --page-requisites \
          --adjust-extension \
          --convert-links \
          --no-parent \
          --directory-prefix=downloaded_site \
          ${{ github.event.inputs.site_url }}

    - name: Upload downloaded site as artifact
      uses: actions/upload-artifact@v4
      with:
        name: downloaded-site
        path: downloaded_site/
